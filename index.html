<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monopoly - Tablero clásico (simplificado)</title>
  <style>
    :root{
      --bg:#e6f7ff;
      --board-bg:#cfe8d9;
      --card:#ffffff;
      --muted:#3b4752;
      --accent:#c0392b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#f6fbff, #e6f7ff);color:var(--muted);display:flex;justify-content:center;padding:18px}

    .container{width:1100px;display:flex;gap:18px}
    .left{width:420px}
    .right{flex:1}

    /* Sidebar */
    .panel{background:var(--card);border-radius:12px;padding:14px;border:1px solid rgba(0,0,0,0.06)}
    h1{margin:0;font-size:18px}
    .lead{font-size:13px;color:gray;margin-top:6px}
    .players{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .player{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:linear-gradient(180deg,#fff,#fbfbfb);border:1px solid rgba(0,0,0,0.04)}
    .avatar{width:40px;height:40;border-radius:6px;background:#f1f1f1;display:flex;align-items:center;justify-content:center;font-weight:700}
    .controls{display:flex;gap:8px;margin-top:12px}
    button{padding:8px 10px;border-radius:8px;border:none;background:#1b8ad9;color:white;cursor:pointer}
    button.secondary{background:#fff;border:1px solid #ddd;color:#333}
    .log{height:320px;overflow:auto;background:#f9f9f9;padding:8px;border-radius:8px;margin-top:12px;border:1px solid #eee;font-size:13px}

    /* Board grid 11x11 */
    .board-wrap{background:var(--board-bg);padding:12px;border-radius:12px;border:6px solid #a7d3b8}
    .board{display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);gap:6px;width:640px;height:640px;background:linear-gradient(180deg,#dff3e8,#cfe8d9);border-radius:8px;padding:8px}
    .cell{background:white;border-radius:6px;border:2px solid #d6d6d6;position:relative;padding:6px;display:flex;flex-direction:column;justify-content:space-between}
    .corner{grid-column:auto;grid-row:auto;display:flex;align-items:center;justify-content:center;font-weight:800}
    .name{font-size:11px;font-weight:700}
    .price{font-size:12px;color:#333}
    .colorbar{height:10px;border-radius:6px;margin-bottom:6px}
    .token{position:absolute;left:6px;bottom:6px;font-size:12px;padding:4px 6px;border-radius:6px;background:rgba(0,0,0,0.12)}

    /* property color swatches similar to original */
    .brown{background:#6b4a3a}
    .light-blue{background:#8bd3ff}
    .pink{background:#ffb6e6}
    .orange{background:#ffb36b}
    .red{background:#ff7b7b}
    .yellow{background:#f7e36b}
    .green{background:#7fd39a}
    .dark-blue{background:#6f92ff}

    /* center logo */
    .center{grid-column:3/span 7;grid-row:3/span 7;background:linear-gradient(180deg,#ffffff,#f0f6f2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-direction:column;border:2px solid #e5efe8}
    .monopoly-logo{font-size:48px;color:#c0392b;font-weight:900;transform:rotate(-20deg)}
    .mr-white{font-size:12px;color:#333;margin-top:8px}

    @media(max-width:1200px){ .container{flex-direction:column;align-items:center} .left{width:100%} .board{width:520px;height:520px} }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="panel">
        <h1>Monopoly - Clásico (simplificado)</h1>
        <p class="lead">Tablero con apariencia y disposición de casillas similar al juego original. Versión simplificada sin casas/hoteles.</p>

        <div style="margin-top:12px">
          <label>Jugadores</label>
          <div style="display:flex;gap:8px;margin-top:8px">
            <select id="playerCount"><option>2</option><option>3</option><option>4</option></select>
            <button id="startBtn">Crear partida</button>
          </div>
        </div>

        <div class="players" id="playersArea"></div>

        <div class="controls">
          <button id="rollBtn">Tirar Dados</button>
          <button id="buyBtn" class="secondary">Comprar</button>
          <button id="endTurnBtn" class="secondary">Terminar</button>
        </div>

        <div class="log" id="log"></div>
      </div>
    </div>

    <div class="right">
      <div class="board-wrap">
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

<script>
// Lógica del juego (simplificada) + render del tablero en estilo clásico
const STARTING_MONEY = 1500;
const BOARD_SIZE = 40;

class Property{constructor(name,price,rent,color=null){this.name=name;this.price=price;this.rent=rent;this.color=color;this.owner=null;this.mortgaged=false}}
class Player{constructor(name){this.name=name;this.pos=0;this.money=STARTING_MONEY;this.properties=[];this.inJail=false;this.jailTurns=0;this.bankrupt=false;this.getOutCards=0;this.doublesCount=0}}

const boardTemplate=[
  ["Salida",0,0], ["Mediteráneo",60,2,'brown'], ["Community Chest",0,0], ["Báltica",60,4,'brown'], ["Impuesto",0,0],
  ["Estación 1",200,25],["Oriental",100,6,'light-blue'],["Chance",0,0],["Vermont",100,6,'light-blue'],["Connecticut",120,8,'light-blue'],
  ["Carcel",0,0],["St. Charles",140,10,'pink'],["Electric Company",150,0],["States",140,10,'pink'],["Virginia",160,12,'pink'],
  ["Estación 2",200,25],["St. James",180,14,'orange'],["Community Chest",0,0],["Tennessee",180,14,'orange'],["New York",200,16,'orange'],
  ["Parking",0,0],["Kentucky",220,18,'red'],["Chance",0,0],["Indiana",220,18,'red'],["Illinois",240,20,'red'],
  ["Estación 3",200,25],["Atlantic",260,22,'yellow'],["Ventnor",260,22,'yellow'],["Water Works",150,0],["Marvin Gardens",280,24,'yellow'],
  ["Go to Jail",0,0],["Pacific",300,26,'green'],["North Carolina",300,26,'green'],["Community Chest",0,0],["Pennsylvania",320,28,'green'],
  ["Estación 4",200,25],["Chance",0,0],["Park Place",350,35,'dark-blue'],["Impuesto de lujo",0,0],["Boardwalk",400,50,'dark-blue']
];

const board = boardTemplate.map(b=> new Property(b[0],b[1],b[2],b[3]||null));
let game = null;

// mapping board index -> grid position (row,col) 1-based in 11x11
const indexToGrid = (()=>{
  const map = [];
  // bottom row: indices 0..10 from right to left (cols 11..1)
  for(let i=0;i<=10;i++){ const col=11-i; map.push({r:11,c:col}); }
  // left column going up: 11..19 -> rows 10..2 at col 1
  for(let i=11;i<=19;i++){ const row=21-i; map.push({r:row,c:1}); }
  // top row left->right: 20..30 at row1 cols1..11
  for(let i=20;i<=30;i++){ const col=i-19; map.push({r:1,c:col}); }
  // right column going down: 31..39 -> rows 2..10 col11
  for(let i=31;i<=39;i++){ const row=i-29; map.push({r:row,c:11}); }
  return map;
})();

// Create DOM grid 11x11 and place cells according to mapping
function createBoardDOM(){
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  // create 11x11 cell placeholders
  for(let row=1;row<=11;row++){
    for(let col=1;col<=11;col++){
      const id = `cell-${row}-${col}`;
      const div = document.createElement('div');
      div.className = 'cell';
      div.id = id;
      div.style.gridRowStart = row;
      div.style.gridColumnStart = col;
      boardEl.appendChild(div);
    }
  }
  // center large tile
  const center = document.createElement('div');
  center.className='center';
  center.style.gridRowStart = 3; center.style.gridRowEnd = 'span 7';
  center.style.gridColumnStart = 3; center.style.gridColumnEnd = 'span 7';
  center.innerHTML = `<div class="monopoly-logo">MONOPOLY</div><div class="mr-white">Versión simplificada</div>`;
  boardEl.appendChild(center);

  // place each board index into its grid cell
  board.forEach((b,i)=>{
    const pos = indexToGrid[i];
    const cell = document.getElementById(`cell-${pos.r}-${pos.c}`);
    if(!cell) return;
    // mark corners bigger font
    const name = document.createElement('div'); name.className='name'; name.innerText = b.name;
    const price = document.createElement('div'); price.className='price'; price.innerText = b.price>0?`$${b.price}`:'';
    if(b.color){ const band = document.createElement('div'); band.className='colorbar '+(b.color==='brown'?'brown':b.color==='light-blue'?'light-blue':b.color==='pink'?'pink':b.color==='orange'?'orange':b.color==='red'?'red':b.color==='yellow'?'yellow':b.color==='green'?'green':'dark-blue'); cell.appendChild(band); }
    cell.appendChild(name); cell.appendChild(price);
    // add small corner label style for corners
    if([0,10,20,30].includes(i)) { cell.style.display='flex'; cell.style.alignItems='center'; cell.style.justifyContent='center'; cell.style.textAlign='center'; name.style.fontSize='13px'; price.style.fontSize='12px'; }
  });
}

function prependLog(msg){ const log = document.getElementById('log'); const d = document.createElement('div'); d.innerText = `${new Date().toLocaleTimeString()} — ${msg}`; log.prepend(d); }

// Game class and basic interactions (similar to la versión anterior)
class Game{
  constructor(names){ this.players = names.map(n=> new Player(n)); this.currentIndex=0; this.round=1; }
  activePlayers(){ return this.players.filter(p=>!p.bankrupt); }
}

function renderPlayers(){ const area = document.getElementById('playersArea'); area.innerHTML=''; if(!game) return; game.players.forEach((p,idx)=>{
  const el = document.createElement('div'); el.className='player'; el.innerHTML = `<div class="avatar">${p.name.charAt(0).toUpperCase()}</div><div style="flex:1"><strong>${p.name}</strong><div>Dinero: $${p.money}</div><div>Pos: ${p.pos}</div></div><div style="min-width:60px;text-align:right">${p.inJail?'<small style="color:#c0392b">En cárcel</small>':p.bankrupt?'<small style="color:#c0392b">Bancarrota</small>':'Activo'}</div>`;
  area.appendChild(el);
});
 updateTokens();
}

function updateTokens(){ // remove existing tokens
  document.querySelectorAll('.token').forEach(n=>n.remove());
  if(!game) return;
  game.players.forEach((p,idx)=>{
    if(p.bankrupt) return;
    const pos = indexToGrid[p.pos];
    const cell = document.getElementById(`cell-${pos.r}-${pos.c}`);
    if(!cell) return;
    const tok = document.createElement('div'); tok.className='token'; tok.innerText = `@${p.name}`; cell.appendChild(tok);
  });
}

// simple dice roll and movement
function rollDice(){ if(!game) return alert('Crea la partida'); const p = game.players[game.currentIndex]; const d1 = Math.floor(Math.random()*6)+1; const d2 = Math.floor(Math.random()*6)+1; prependLog(`${p.name} tiró ${d1} y ${d2}`); const steps = d1+d2; p.pos = (p.pos + steps) % BOARD_SIZE; prependLog(`${p.name} se mueve a ${board[p.pos].name}`); handleSpace(p); renderPlayers(); checkWin(); }

function handleSpace(player){ const space = board[player.pos]; if(space.price>0 && !space.owner){ prependLog(`${space.name} está libre. Precio $${space.price}`); } else if(space.price>0 && space.owner && space.owner!==player){ const rent = space.rent; prependLog(`${player.name} paga renta $${rent} a ${space.owner.name}`); if(player.money>=rent){ player.money-=rent; space.owner.money+=rent; } else { prependLog(`${player.name} no puede pagar y queda en bancarrota`); player.bankrupt=true; } } else if(space.name==='Impuesto'){ const amt=200; prependLog(`${player.name} paga impuesto $${amt}`); if(player.money>=amt){ player.money-=amt; } else { player.bankrupt=true; } } else if(space.name==='Go to Jail'){ prependLog(`${player.name} va a la cárcel`); player.pos=10; player.inJail=true; } }

function buyProperty(){ if(!game) return; const p = game.players[game.currentIndex]; const space = board[p.pos]; if(space.price<=0) return alert('No comprable'); if(space.owner) return alert('Ya tiene dueño'); if(p.money < space.price) return alert('No tienes dinero'); if(confirm(`¿${p.name} comprar ${space.name} por $${space.price}?`)){ p.money-=space.price; space.owner=p; p.properties.push(space); prependLog(`${p.name} compró ${space.name}`); renderPlayers(); } }

function endTurn(){ if(!game) return; game.currentIndex = (game.currentIndex+1)%game.players.length; if(game.currentIndex===0) game.round++; prependLog('Turno siguiente: '+game.players[game.currentIndex].name); renderPlayers(); }

function checkWin(){ const active = game.activePlayers(); if(active.length<=1){ if(active.length===1){ alert(`${active[0].name} gana!`); prependLog(`${active[0].name} gana el juego`); } else { alert('Todos en bancarrota'); prependLog('Fin del juego'); } }
}

// UI hooks
document.getElementById('startBtn').addEventListener('click', ()=>{
  const n = parseInt(document.getElementById('playerCount').value,10); const names=[]; for(let i=0;i<n;i++){ const nm = prompt(`Nombre jugador ${i+1}:`) || `Jugador${i+1}`; names.push(nm); }
  game = new Game(names); createBoardDOM(); renderPlayers(); prependLog('Partida creada con: '+names.join(', '));
});
document.getElementById('rollBtn').addEventListener('click', rollDice);
document.getElementById('buyBtn').addEventListener('click', buyProperty);
document.getElementById('endTurnBtn').addEventListener('click', endTurn);

// inicializar
createBoardDOM();
</script>
</body>
</html>
